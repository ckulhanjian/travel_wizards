name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also lets you trigger it manually from GitHub.com

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyMuPDF pyinstaller

      - name: Build executable
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name InvoiceProcessor `
            --add-data "overlay.pdf;." `
            --add-data "backside.pdf;." `
            pdf_invoice_renamer.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceProcessor-Windows
          path: dist/InvoiceProcessor.exe
          retention-days: 30