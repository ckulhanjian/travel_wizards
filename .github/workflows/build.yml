name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Invoice_Portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install PyMuPDF reportlab pyinstaller Pillow

      - name: Build executable
        run: python build_exe.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: InvoicePortal-Windows
          path: Invoice_Portal/dist/InvoicePortal.exe
          retention-days: 30